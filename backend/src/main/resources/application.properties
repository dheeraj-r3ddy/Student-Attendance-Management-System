# Server Configuration
server.port=8080
spring.application.name=attendance-backend

# Database Configuration - H2 (For demo)
spring.datasource.url=jdbc:h2:mem:attendance_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Alternative - PostgreSQL Configuration (Uncomment to use PostgreSQL)
#spring.datasource.url=jdbc:postgresql://localhost:5432/attendance_db
#spring.datasource.username=postgres
#spring.datasource.password=your_password
#spring.datasource.driver-class-name=org.postgresql.Driver

# Alternative - MySQL Configuration (Uncomment to use MySQL)
#spring.datasource.url=jdbc:mysql://localhost:3306/attendance_db
#spring.datasource.username=root
#spring.datasource.password=your_password
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For PostgreSQL use: org.hibernate.dialect.PostgreSQLDialect
# For MySQL use: org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=yourSuperSecretKeyForJWTTokenGenerationChangeThisInProduction123456789
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.attendance=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
